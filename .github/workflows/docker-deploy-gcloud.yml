name: Deploy Docker-MCP to GCloud

on:
  push:
    branches:
      - next

jobs:
  build:
    name: Build Docker-MCP
    runs-on: ubuntu-latest
    environment: 
      # <branch>  -> <github environment>
      # next   -> develop
      # next   -> staging
      # main      -> prod
      name: ${{ github.ref_name == 'next' && 'develop' || (github.ref_name == 'main' && 'prod' || github.ref_name) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.IMAGE_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/mcp-server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ vars.IMAGE_REGION }}-docker.pkg.dev/${{ vars.IMAGE_PROJECT_ID }}/droidrun/${{ vars.IMAGE_NAME }}:dev
          ssh: |
            default=${{ env.SSH_AUTH_SOCK }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  
  deploy:
    name: Deploy Cloud
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
    environment:
      name: ${{ github.ref_name == 'next' && 'develop' || (github.ref_name == 'main' && 'prod' || github.ref_name) }}
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER }}
          location: ${{ vars.REGION }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Restart Kubernetes deployment
        run: kubectl rollout restart deployment/${{ vars.K8S_DEPLOYMENT_NAME }} -n ${{ vars.K8S_NAMESPACE }}

